<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHYDER FINAL DIARY ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
  font-family:'Inter',sans-serif;
  margin:0;
  background:radial-gradient(circle at top,#1a1a2e,#0f2027,#000);
  color:#fff;
  overflow-x:hidden;
}
header{
  text-align:center;
  padding:20px;
  font-size:22px;
  letter-spacing:1px;
}
.hero{
  height:220px;
  background:url('https://i.pinimg.com/originals/8c/2c/f0/8c2cf0f06c92dfbdbb6f0f8c4e2d1e5a.jpg') center/cover;
  position:relative;
}
.hero::after{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}
.hero-text{
  position:absolute;
  bottom:15px;
  left:20px;
  z-index:1;
  font-size:20px;
}
.top-bar{text-align:center;margin:10px;}
button{
  background:rgba(255,255,255,0.1);
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:12px;
  margin:5px;
  cursor:pointer;
}
input,textarea{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
.card:hover{transform:scale(1.02);} 
img,video{width:100%;border-radius:12px;margin-top:8px;}
.timeline{margin:20px;padding:15px;background:rgba(255,255,255,0.05);border-radius:20px;}

/* floating hearts */
.heart{
  position:fixed;
  color:#ff4d88;
  animation:floatUp 4s linear infinite;
}
@keyframes floatUp{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-600px);opacity:0;}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-text">RHYDER ✦ My World</div>
</div>

<header>✦ FINAL RHYDER DIARY ✦</header>

<div class="top-bar">
<input type="password" id="password" placeholder="Mật khẩu">
<button onclick="checkPassword()">Mở</button>
<button onclick="playMusic()">🎶</button>
<button onclick="createHeart()">💖</button>
<button onclick="exportData()">💾</button>
<input type="file" onchange="importData(event)">
</div>

<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<div id="main" style="display:none">
<div class="container">

<div class="card"><h3>📖 Nhật ký</h3><textarea id="diary"></textarea><button onclick="saveData('diary')">Lưu</button></div>
<div class="card"><h3>🎤 RHYDER moment</h3><textarea id="knowledge"></textarea><button onclick="saveData('knowledge')">Lưu</button></div>
<div class="card"><h3>💭 Suy nghĩ</h3><textarea id="thoughts"></textarea><button onclick="saveData('thoughts')">Lưu</button></div>
<div class="card"><h3>🌙 Cảm xúc</h3><textarea id="gratitude"></textarea><button onclick="saveData('gratitude')">Lưu</button></div>

<div class="card">
<h3>🖼️ Ảnh</h3>
<input type="file" id="imageInput"><button onclick="saveImage()">Lưu ảnh</button>
<img id="preview">
</div>

<div class="card">
<h3>🎥 Video</h3>
<input type="file" id="videoInput"><button onclick="saveVideo()">Lưu video</button>
<video id="videoPreview" controls></video>
</div>

</div>

<div class="timeline">
<h3>📌 Timeline</h3>
<div id="timelineContent"></div>
</div>

</div>

<script>
const correctPassword="1234";
function today(){return new Date().toISOString().split('T')[0];}

function checkPassword(){
let input=document.getElementById('password').value;
if(input===correctPassword){document.getElementById('main').style.display='block';loadData();loadTimeline();}
else alert('Sai mật khẩu');}

function saveData(id){localStorage.setItem(id+today(),document.getElementById(id).value);loadTimeline();}

function loadData(){['diary','knowledge','thoughts','gratitude'].forEach(id=>{
let d=localStorage.getItem(id+today()); if(d) document.getElementById(id).value=d;});
let img=localStorage.getItem('img'+today()); if(img) document.getElementById('preview').src=img;
let vid=localStorage.getItem('vid'+today()); if(vid) document.getElementById('videoPreview').src=vid;
}

function saveImage(){let file=document.getElementById('imageInput').files[0]; let r=new FileReader();
r.onload=()=>{localStorage.setItem('img'+today(),r.result);document.getElementById('preview').src=r.result;};
if(file) r.readAsDataURL(file);
}

function saveVideo(){let file=document.getElementById('videoInput').files[0]; let r=new FileReader();
r.onload=()=>{localStorage.setItem('vid'+today(),r.result);document.getElementById('videoPreview').src=r.result;};
if(file) r.readAsDataURL(file);
}

function exportData(){let data={}; for(let i=0;i<localStorage.length;i++){let k=localStorage.key(i); data[k]=localStorage.getItem(k);} 
let blob=new Blob([JSON.stringify(data)],{type:'application/json'});
let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup.json'; a.click();}

function importData(e){let file=e.target.files[0]; let r=new FileReader();
r.onload=()=>{let data=JSON.parse(r.result); for(let k in data){localStorage.setItem(k,data[k]);} loadTimeline();};
if(file) r.readAsText(file);
}

function loadTimeline(){
let container=document.getElementById('timelineContent');
container.innerHTML='';
for(let i=0;i<localStorage.length;i++){
let key=localStorage.key(i);
if(key.includes('diary')){
let date=key.replace('diary','');
let text=localStorage.getItem(key);
container.innerHTML+=`<p><b>${date}</b>: ${text.substring(0,40)}...</p>`;
}
}
}

function playMusic(){
let music=document.getElementById('bgMusic');
music.play();
}

function createHeart(){
let heart=document.createElement('div');
heart.className='heart';
heart.innerHTML='💖';
heart.style.left=Math.random()*100+'%';
heart.style.top='80%';
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
}
</script>

</body>
</html>
